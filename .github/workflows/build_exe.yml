name: 打包运费自动化提取工具为EXE

on:
  push:
    branches:
      - main  # 当你向 main 分支推送代码时触发（如果是 master 请改为 master）
  workflow_dispatch: # 允许你在 GitHub 页面上点击按钮手动触发打包

jobs:
  build:
    runs-on: windows-latest # 在 Windows 环境下运行打包，确保生成的是 .exe

    steps:
    # 1. 拉取仓库代码
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. 设置 Python 环境
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # 推荐使用 3.10，稳定且兼容性好
        cache: 'pip' # 开启缓存加速后续构建

    # 3. 安装脚本所需的依赖和打包工具
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas openpyxl pyinstaller

    # 4. 使用 PyInstaller 进行打包
    # --onefile 表示打包成单个独立 exe
    # --clean 表示清理缓存
    # -n 指定生成的 exe 文件名
    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --onefile --clean -n "运费自动化提取321" "运费自动化提取321.py"

    # 5. 上传生成的 EXE 到 GitHub Artifacts 供直接下载
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: 运费自动化提取321-EXE-绿色版
        path: dist/运费自动化提取321.exe
        retention-days: 7 # 附件保存 7 天
